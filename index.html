<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{--ocean:#0E6E7E;--ocean2:#1388A2;--ink:#05111E;--f1:'Playfair Display',serif;--f2:'DM Sans',sans-serif;}
html,body{height:100%;font-family:var(--f2)}
body{background:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;position:relative;}
.bg{position:fixed;inset:0;z-index:0}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 110%,rgba(14,110,126,.35) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 5%,rgba(217,128,10,.14) 0%,transparent 55%),radial-gradient(ellipse 40% 40% at 8% 20%,rgba(27,92,62,.12) 0%,transparent 55%),linear-gradient(160deg,#040D18 0%,#070F1C 50%,#040D18 100%);}
.bg-grid{position:absolute;inset:0;opacity:.038;background-image:linear-gradient(rgba(14,110,126,.8) 1px,transparent 1px),linear-gradient(90deg,rgba(14,110,126,.8) 1px,transparent 1px);background-size:58px 58px;}
.stars{position:absolute;inset:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:twinkle var(--d) ease-in-out infinite var(--delay);}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.55}}
.card{position:relative;z-index:2;text-align:center;padding:0 1.5rem;max-width:600px;width:100%;animation:rise .9s cubic-bezier(.22,1,.36,1) both;}
@keyframes rise{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
.logo{font-family:var(--f1);font-size:clamp(3.8rem,10vw,6.5rem);font-weight:800;color:#fff;letter-spacing:-4px;line-height:1;margin-bottom:.5rem;}
.logo em{color:var(--ocean2);font-style:italic;font-weight:600}
h1{font-family:var(--f1);font-size:clamp(1.6rem,4.5vw,2.4rem);font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1.15;margin-bottom:1.5rem;}
.verticals{display:flex;flex-wrap:wrap;justify-content:center;gap:.38rem;margin-bottom:2.4rem;}
.vert{display:inline-flex;align-items:center;gap:.28rem;font-size:.62rem;font-weight:600;color:rgba(255,255,255,.3);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:.18rem .62rem;border-radius:5px;transition:all .5s;}
.vert.lit{color:rgba(255,255,255,.75);background:rgba(14,110,126,.18);border-color:rgba(14,110,126,.32);}
.notify{display:flex;gap:.5rem;max-width:360px;margin:0 auto 2rem;}
.notify input{flex:1;padding:.6rem .9rem;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#fff;font-family:var(--f2);font-size:.8rem;outline:none;}
.notify button{padding:.6rem 1.1rem;background:linear-gradient(135deg,var(--ocean),var(--ocean2));color:#fff;border:none;border-radius:10px;font-family:var(--f2);font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;box-shadow:0 4px 14px rgba(14,110,126,0.4);}
.socials{display:flex;align-items:center;justify-content:center;gap:1rem;font-size:.65rem;color:rgba(255,255,255,.2);}
.soc-link{color:rgba(255,255,255,.25);text-decoration:none;font-weight:600;}
.domain{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.1);}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NXJBHXXD" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<div class="bg"><div class="bg-grad"></div><div class="bg-grid"></div><div class="stars" id="stars"></div></div>
<div class="card">
  <div class="logo">Vela<em>Go</em></div>
  <h1>Something <em>great</em> is<br>almost ready.</h1>
  <div class="verticals">
    <span class="vert">FINTECH AUDIT</span>
    <span class="vert">LATENCY INDEX</span>
    <span class="vert">SYSTEMS BUNDLING</span>
  </div>
  <div class="notify">
    <input type="email" placeholder="your@email.com" id="email-inp">
    <button onclick="notifyMe()">Notify Me →</button>
  </div>
  <div class="socials">
    <a class="soc-link" href="https://instagram.com/velagoapp">Instagram</a>
    <span>@velagoapp</span>
  </div>
</div>
<div class="domain">velago.app</div>
<script>
const stars=document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:-${Math.random()*4}s;`;stars.appendChild(s);}
const verts=document.querySelectorAll('.vert');let vi=0;
setInterval(()=>{if(vi<verts.length){verts[vi].classList.add('lit');vi++;}},800);
function notifyMe(){
  const inp=document.getElementById('email-inp');
  const btn=document.querySelector('.notify button');
  if(!inp.value.includes('@')){inp.style.borderColor='#C13268';return;}
  btn.textContent='✓ Added';
  btn.style.background='#1B5C3E';
  inp.value='';
}
</script>
</body>
</html>
