<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{--ocean:#0E6E7E;--ocean2:#1388A2;--ink:#05111E;--f1:'Playfair Display',serif;--f2:'DM Sans',sans-serif;}
html,body{height:100%;font-family:var(--f2)}
body{background:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;position:relative;}
.bg{position:fixed;inset:0;z-index:0}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 110%,rgba(14,110,126,.35) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 90% 5%,rgba(217,128,10,.14) 0%,transparent 55%),radial-gradient(ellipse 40% 40% at 8% 20%,rgba(27,92,62,.12) 0%,transparent 55%),linear-gradient(160deg,#040D18 0%,#070F1C 50%,#040D18 100%);}
.bg-grid{position:absolute;inset:0;opacity:.038;background-image:linear-gradient(rgba(14,110,126,.8) 1px,transparent 1px),linear-gradient(90deg,rgba(14,110,126,.8) 1px,transparent 1px);background-size:58px 58px;}
.stars{position:absolute;inset:0;overflow:hidden}
.star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:twinkle var(--d) ease-in-out infinite var(--delay);}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.55}}
.horizon{position:absolute;bottom:28%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(14,110,126,.25) 30%,rgba(19,136,162,.4) 50%,rgba(14,110,126,.25) 70%,transparent);}
.card{position:relative;z-index:2;text-align:center;padding:0 1.5rem;max-width:600px;width:100%;animation:rise .9s cubic-bezier(.22,1,.36,1) both;}
@keyframes rise{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
.crescent{font-size:1.8rem;display:block;margin-bottom:.6rem;animation:crescFloat 5s ease-in-out infinite,rise .7s .05s both;filter:drop-shadow(0 0 18px rgba(14,110,126,.8));}
@keyframes crescFloat{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-7px) rotate(-8deg)}}
.logo{font-family:var(--f1);font-size:clamp(3.8rem,10vw,6.5rem);font-weight:800;color:#fff;letter-spacing:-4px;line-height:1;margin-bottom:.5rem;animation:rise .8s .1s both;}
.logo em{color:var(--ocean2);font-style:italic;font-weight:600}
.tag{font-size:clamp(.55rem,.9vw,.7rem);letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.22);margin-bottom:2.2rem;animation:rise .8s .18s both;}
.divider{width:64px;height:2px;background:linear-gradient(90deg,transparent,var(--ocean),transparent);margin:0 auto 2rem;border-radius:2px;animation:rise .8s .22s both;}
.pill{display:inline-flex;align-items:center;gap:.5rem;background:rgba(14,110,126,.12);border:1px solid rgba(14,110,126,.28);border-radius:100px;padding:.32rem 1rem;font-size:.72rem;font-weight:600;color:rgba(255,255,255,.6);margin-bottom:1.8rem;animation:rise .8s .28s both;}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--ocean2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
h1{font-family:var(--f1);font-size:clamp(1.6rem,4.5vw,2.4rem);font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1.15;margin-bottom:.9rem;animation:rise .8s .32s both;}
h1 em{color:var(--ocean2);font-style:italic}
p.sub{font-size:clamp(.82rem,2vw,.92rem);color:rgba(255,255,255,.38);line-height:1.85;max-width:420px;margin:0 auto 2.2rem;font-weight:300;animation:rise .8s .38s both;}
.verticals{display:flex;flex-wrap:wrap;justify-content:center;gap:.38rem;margin-bottom:2.4rem;animation:rise .8s .44s both;}
.vert{display:inline-flex;align-items:center;gap:.28rem;font-size:.62rem;font-weight:600;color:rgba(255,255,255,.3);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:.18rem .62rem;border-radius:5px;transition:all .5s;}
.vert.lit{color:rgba(255,255,255,.75);background:rgba(14,110,126,.18);border-color:rgba(14,110,126,.32);}
.prog-wrap{max-width:340px;margin:0 auto 1rem;animation:rise .8s .5s both;}
.prog-label{display:flex;justify-content:space-between;font-size:.62rem;color:rgba(255,255,255,.25);margin-bottom:.45rem;}
.prog-bar{height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--ocean),var(--ocean2));border-radius:3px;animation:fillBar 2s 1s ease-out forwards;}
@keyframes fillBar{to{width:72%}}
.notify-lbl{font-size:.65rem;color:rgba(255,255,255,.18);margin-bottom:.8rem;animation:rise .8s .52s both;}
.notify{display:flex;gap:.5rem;max-width:360px;margin:0 auto 2rem;animation:rise .8s .55s both;}
.notify input{flex:1;padding:.6rem .9rem;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#fff;font-family:var(--f2);font-size:.8rem;outline:none;transition:border-color .18s;}
.notify input::placeholder{color:rgba(255,255,255,.2)}
.notify input:focus{border-color:var(--ocean)}
.notify button{padding:.6rem 1.1rem;background:linear-gradient(135deg,var(--ocean),var(--ocean2));color:#fff;border:none;border-radius:10px;font-family:var(--f2);font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;box-shadow:0 4px 14px rgba(14,110,126,.4);}
.notify button:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(14,110,126,.55)}
.socials{display:flex;align-items:center;justify-content:center;gap:1rem;font-size:.65rem;color:rgba(255,255,255,.2);animation:rise .8s .6s both;}
.soc-link{color:rgba(255,255,255,.25);text-decoration:none;font-weight:600;transition:color .18s;}
.soc-link:hover{color:var(--ocean2)}
.soc-sep{width:1px;height:12px;background:rgba(255,255,255,.1)}
.domain{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.1);z-index:3;}
.route{position:fixed;bottom:24%;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04) 40%,rgba(255,255,255,.06) 50%,rgba(255,255,255,.04) 60%,transparent);z-index:1;}
.plane-fly{position:absolute;top:-12px;font-size:1rem;filter:drop-shadow(0 0 8px rgba(14,110,126,.7));animation:flyAcross 10s cubic-bezier(.4,0,.2,1) infinite 2s;opacity:0;}
@keyframes flyAcross{0%{left:-2%;opacity:0}3%{opacity:1}95%{left:102%;opacity:1}100%{left:102%;opacity:0}}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NXJBHXXD" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<div class="bg"><div class="bg-grad"></div><div class="bg-grid"></div><div class="stars" id="stars"></div><div class="horizon"></div></div>
<div class="route"><div class="plane-fly">✈</div></div>
<div class="card">
  <span class="crescent">☽</span>
  <div class="logo">Vela<em>Go</em></div>
  <div class="tag">Every Journey · One App</div>
  <div class="pill"><span class="pdot"></span>We're putting the finishing touches</div>
  <h1>Something <em>great</em> is<br>almost ready.</h1>
  <div class="divider"></div>
  <div class="notify-lbl">Get notified when we launch</div>
  <div class="notify">
    <input type="email" placeholder="your@email.com" id="email-inp">
    <button onclick="notifyMe()">Notify Me →</button>
  </div>
  <div class="socials">
    <a class="soc-link" href="https://instagram.com/velagoapp" target="_blank">Instagram</a>
    <div class="soc-sep"></div>
    <a class="soc-link" href="https://tiktok.com/@velago.app" target="_blank">TikTok</a>
    <div class="soc-sep"></div>
    <span>@velagoapp</span>
  </div>
</div>
<div class="domain">velago.app</div>
<script>
const stars=document.getElementById('stars');
for(let i=0;i<80;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:-${Math.random()*4}s;opacity:${.05+Math.random()*.15};`;stars.appendChild(s);}
const verts=document.querySelectorAll('.vert:not(.lit)');let vi=0;
setInterval(()=>{if(vi<verts.length){verts[vi].classList.add('lit');vi++;}},800);
function notifyMe(){
  const inp=document.getElementById('email-inp');
  const email=inp.value.trim();
  if(!email||!email.includes('@')){inp.style.borderColor='#C13268';setTimeout(()=>inp.style.borderColor='',1200);return;}
  inp.value='';
  const btn=document.querySelector('.notify button');
  btn.textContent='✓ You\'re on the list!';
  btn.style.background='linear-gradient(135deg,#1B5C3E,#2D7A52)';
  setTimeout(()=>{btn.textContent='Notify Me →';btn.style.background='';},3500);
}
document.getElementById('email-inp').addEventListener('keydown',e=>{if(e.key==='Enter')notifyMe();});
</script>
</body>
</html>
