<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VelaGo | SGT-JKT Latency Index</title>
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f)})(window,document,'script','dataLayer','GTM-NXJBHXXD');</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{--ocean:#0E6E7E;--ocean2:#1388A2;--ink:#05111E;--f1:'Playfair Display',serif;--f2:'DM Sans',sans-serif;}
body{background:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;position:relative;font-family:var(--f2);color:#fff;}
.bg{position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 110%,rgba(14,110,126,.35) 0%,transparent 60%),linear-gradient(160deg,#040D18 0%,#070F1C 50%,#040D18 100%);z-index:0;}
.bg-grid{position:absolute;inset:0;opacity:.04;background-image:linear-gradient(rgba(14,110,126,.8) 1px,transparent 1px),linear-gradient(90deg,rgba(14,110,126,.8) 1px,transparent 1px);background-size:60px 60px;}
.card{position:relative;z-index:2;text-align:center;max-width:600px;width:100%;padding:0 1.5rem;animation:rise .9s ease-out;}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{font-family:var(--f1);font-size:clamp(3.5rem,10vw,5rem);font-weight:800;letter-spacing:-3px;margin-bottom:1rem;}
.logo em{color:var(--ocean2);font-style:italic;}
h1{font-family:var(--f1);font-size:1.8rem;margin-bottom:1.5rem;line-height:1.2;}
.verticals{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem;margin-bottom:2rem;}
.vert{font-size:.65rem;font-weight:600;color:rgba(255,255,255,.4);background:rgba(14,110,126,.15);border:1px solid rgba(14,110,126,.3);padding:.4rem .8rem;border-radius:5px;}
.notify{display:flex;gap:.5rem;max-width:360px;margin:0 auto 2rem;}
.notify input{flex:1;padding:.7rem;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;outline:none;}
.notify button{padding:.7rem 1.2rem;background:linear-gradient(135deg,var(--ocean),var(--ocean2));color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;white-space:nowrap;}
.domain{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.15);}
</style>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NXJBHXXD" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<div class="bg"><div class="bg-grid"></div></div>
<div class="card">
  <div class="logo">Vela<em>Go</em></div>
  <h1>Something <em>great</em> is almost ready.</h1>
  <div class="verticals">
    <span class="vert">FINTECH AUDIT</span>
    <span class="vert">LATENCY INDEX</span>
    <span class="vert">SYSTEMS BUNDLING</span>
  </div>
  <div class="notify">
    <input type="email" placeholder="your@email.com" id="email-inp">
    <button onclick="getAccess()">Notify Me →</button>
  </div>
</div>
<div class="domain">velago.app</div>
<script>
function getAccess() {
  const inp = document.getElementById('email-inp');
  const btn = document.querySelector('.notify button');
  if(!inp.value.includes('@')) {
    inp.style.borderColor = '#C13268';
    setTimeout(() => inp.style.borderColor = '', 1200);
    return;
  }
  btn.textContent = '✓ Added';
  btn.style.background = '#1B5C3E';
  inp.value = '';
}
</script>
</body>
</html>
